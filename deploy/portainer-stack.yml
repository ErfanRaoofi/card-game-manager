# Portainer Stack — بدون nginx (از Nginx Proxy Manager استفاده می‌شود)
# Compose path: deploy/portainer-stack.yml

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hokmdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hokmdb']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME}/hokm-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-hokmdb}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - proxy-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/hokm-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-4000}:4000'
    environment:
      PORT: 4000
    depends_on:
      - backend
    networks:
      - app-network
      - proxy-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
  proxy-network:
    external: true
    name: ${PROXY_NETWORK:-proxy-network}
