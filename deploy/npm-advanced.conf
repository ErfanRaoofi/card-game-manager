# Nginx Proxy Manager → Proxy Host → دامنه اصلی (مثلاً hokm.example.com)
# Forward: frontend — IP سرور یا نام کانتینر — پورت 4000
# SSL: Let's Encrypt را فعال کن
#
# تب Advanced — این بلوک را paste کن (اگر Custom Locations در NPM نداری):

location /api/ {
    proxy_pass http://127.0.0.1:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /socket.io/ {
    proxy_pass http://127.0.0.1:5000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# اگر NPM و stack روی یک Docker host هستند و در یک شبکه مشترک‌اند،
# به‌جای 127.0.0.1 از نام سرویس استفاده کن: http://backend:5000
