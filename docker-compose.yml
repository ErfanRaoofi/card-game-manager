# با Nginx Proxy Manager: سرویس nginx اینجا لازم نیست.
# پورت‌ها را publish کن و در NPM به host:port اشاره کن (یا stack را به شبکه NPM وصل کن).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hokmdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hokmdb}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME:-hokm}/hokm-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-hokmdb}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME:-hokm}/hokm-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-4000}:4000'
    environment:
      PORT: 4000
    depends_on:
      - backend

volumes:
  pgdata:
