<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6 font-sans" dir="rtl">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">مدیریت بازی حکم</h1>
    <p class="text-center text-sm text-gray-500 mb-6">ثبت‌نام یا ورود برای ساخت اتاق و ثبت امتیاز</p>

    <div class="flex rounded-lg border mb-6 overflow-hidden">
      <button
        type="button"
        class="flex-1 py-2 text-sm font-medium"
        [class.bg-blue-600]="mode() === 'login'"
        [class.text-white]="mode() === 'login'"
        [class.bg-white]="mode() !== 'login'"
        (click)="setMode('login')"
      >
        ورود
      </button>
      <button
        type="button"
        class="flex-1 py-2 text-sm font-medium"
        [class.bg-blue-600]="mode() === 'register'"
        [class.text-white]="mode() === 'register'"
        [class.bg-white]="mode() !== 'register'"
        (click)="setMode('register')"
      >
        ثبت‌نام
      </button>
    </div>

    @if (error()) {
      <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm text-center">{{ error() }}</div>
    }

    <form class="space-y-4" (ngSubmit)="submit()">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">نام کاربری (انگلیسی)</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          autocomplete="username"
          placeholder="ali_player"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
        />
        <p class="text-xs text-gray-400 mt-1">۳–۳۲ کاراکتر: a-z، 0-9، _</p>
      </div>

      @if (mode() === 'register') {
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">نام نمایشی</label>
          <input
            type="text"
            [(ngModel)]="displayName"
            name="displayName"
            placeholder="علی"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>
      }

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">رمز عبور</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading() || !username.trim() || !password"
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 disabled:opacity-50"
      >
        {{ loading() ? 'لطفاً صبر کنید...' : (mode() === 'login' ? 'ورود' : 'ثبت‌نام') }}
      </button>
    </form>
  </div>
</div>
